<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Economic Info — CS2 Eco Board</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/dashboard.css?v=4">
  <link rel="stylesheet" href="css/eco_board.css?v=1">
</head>
<body class="dashboard-body eco-board-page" data-theme="dark">
  <header class="dashboard-header eco-board-header">
    <div class="header-inner">
      <h1 class="dashboard-title">Team Economic Info</h1>
    </div>
  </header>

  <main class="eco-board-main">
    <!-- Round navigation -->
    <section class="eco-round-nav">
      <button type="button" class="eco-nav-btn" id="btnLastRound" aria-label="Previous round">← Last Round</button>
      <div class="eco-round-input-wrap">
        <span class="eco-round-label">Round</span>
        <input type="number" id="currentRound" class="eco-round-input" min="1" value="1" aria-label="Current round">
      </div>
      <button type="button" class="eco-nav-btn" id="btnNextRound" aria-label="Next round">Next Round →</button>
    </section>

    <!-- Side selector (T/CT affects Molotov vs Incendiary price) -->
    <section class="eco-side-select">
      <label>Side</label>
      <div class="eco-side-btns">
        <button type="button" class="eco-side-btn active" data-side="T">T</button>
        <button type="button" class="eco-side-btn" data-side="CT">CT</button>
      </div>
    </section>

    <!-- 5 Player cards -->
    <section class="eco-players-grid" id="playersGrid">
      <!-- Filled by JS: Player1..5 with money + Main/Pistol/Equipment/Grenades -->
    </section>

    <!-- Team economy summary + Strategy buttons + Recommendation -->
    <section class="eco-bottom-section">
      <div class="eco-summary-block">
        <h3>Team economy</h3>
        <ul class="eco-summary-list">
          <li>Win +<span id="winBonus">3250</span></li>
          <li>Loss +<span id="lossBonus">1400</span> ~ <span id="lossBonusMax">3400</span></li>
          <li>Average Team Economy: <strong id="avgEconomy">0</strong></li>
          <li>Total Equipment Value: <strong id="totalEquipment">0</strong></li>
          <li>Next Round Average: <strong id="nextRoundAvg">0</strong></li>
        </ul>
        <div class="eco-strategy-btns">
          <button type="button" class="eco-strategy-btn" data-strategy="eco">Eco</button>
          <button type="button" class="eco-strategy-btn active" data-strategy="halfbuy">Half Buy</button>
          <button type="button" class="eco-strategy-btn" data-strategy="fullbuy">Full Buy</button>
        </div>
      </div>
      <div class="eco-recommend-block">
        <h3>Recommend combination:</h3>
        <div class="eco-recommend-content" id="recommendContent">
          <p class="eco-recommend-placeholder">Choose a strategy to see recommended buy</p>
          <div class="eco-recommend-items" id="recommendItems"></div>
          <div class="eco-recommend-total" id="recommendTotal"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/eco_board.js"></script>
</body>
</html>
