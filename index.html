<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esports Data Dashboard — Five Color Squad</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</head>
<body class="dashboard-body" data-theme="dark">
  <!-- 顶部游戏切换栏 -->
  <header class="dashboard-header">
    <div class="header-inner">
      <h1 class="dashboard-title">Esports Data Dashboard</h1>
      <div class="header-actions">
        <div class="theme-toggle" id="themeToggle" title="切换日/夜间模式">
          <span class="theme-icon theme-sun">☀</span>
          <span class="theme-icon theme-moon">☽</span>
        </div>
        <div class="game-toggle">
          <button class="game-btn active" data-game="cs">
            <span class="game-icon game-icon-cs" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="8"/>
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
                <circle cx="12" cy="12" r="2"/>
              </svg>
            </span>
            Counter-Strike
          </button>
          <button class="game-btn" data-game="dota2">
            <span class="game-icon game-icon-dota" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L3 7v6c0 5 4 8.5 9 9.5 5-1 9-4.5 9-9.5V7L12 2z"/>
                <path d="M12 9v6M9 12h6"/>
              </svg>
            </span>
            DOTA 2
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容区：世界地图 -->
  <main class="dashboard-main">
    <div class="map-wrapper">
      <div class="map-info-bar">
        <span class="current-game" id="currentGameLabel">Counter-Strike</span>
        <span class="hint">点击国家查看该地区的电竞数据</span>
      </div>
      <div id="worldMap" class="world-map-container loading">
        <div class="map-loading">
          <div class="map-spinner"></div>
          <span>加载世界地图...</span>
        </div>
      </div>
      <div class="country-tooltip" id="countryTooltip"></div>
    </div>

    <!-- 国家详情面板（点击国家后显示） -->
    <aside class="detail-panel collapsed" id="detailPanel">
      <div class="detail-panel-inner">
        <button class="detail-close" id="detailClose">&times;</button>
        <h3 class="detail-title" id="detailCountryName">—</h3>
        <div class="detail-content" id="detailContent">
          <p class="detail-placeholder">选择国家后将显示该地区的电竞数据</p>
        </div>
      </div>
    </aside>
  </main>

  <footer class="dashboard-footer">
    <p>CSC316 — Five Color Squad</p>
  </footer>

  <script src="js/dashboard.js"></script>
</body>
</html>
